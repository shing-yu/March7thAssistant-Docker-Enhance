<!DOCTYPE html>
<html lang="zh-CN" class="dark h-full w-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March7th Assistant WebUI</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Element Plus CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/theme-chalk/dark/css-vars.css">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
          },
          colors: {
            primary: '#8b5cf6', // Violet-500
            'primary-hover': '#7c3aed', // Violet-600
            'bg-deep': '#020617', // Slate-950
            'bg-glass': 'rgba(15, 23, 42, 0.65)',
            'glass-border': 'rgba(255, 255, 255, 0.1)',
          }
        }
      }
    }
  </script>
  
  <!-- Custom CSS (Element overrides) -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="h-full w-full m-0 p-0 bg-bg-deep text-slate-100 font-sans overflow-hidden bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/40 via-slate-900 to-slate-950">
  <div id="app" v-cloak class="h-full w-full flex flex-col">
    <!-- Login Screen -->
    <div v-if="!isAuthenticated" class="flex-1 flex justify-center items-center relative overflow-hidden">
      <!-- Decorative background elements -->
      <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-violet-600/20 rounded-full blur-3xl"></div>
      <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-fuchsia-600/20 rounded-full blur-3xl"></div>

      <div class="w-[420px] bg-bg-glass backdrop-blur-xl border border-glass-border p-10 rounded-3xl shadow-[0_0_40px_-10px_rgba(139,92,246,0.3)] z-10 transition-all">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500 shadow-lg mb-6">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-fuchsia-400 mb-2">March7th WebUI</h2>
          <p class="text-slate-400 text-sm">Please enter your token to continue</p>
        </div>
        
        <div class="space-y-6">
          <el-input 
            v-model="tokenInput" 
            type="password" 
            placeholder="Access Token" 
            @keyup.enter="login"
            size="large"
            show-password
            class="custom-el-input">
          </el-input>
          
          <button @click="login" :disabled="loginLoading" class="w-full relative group overflow-hidden rounded-xl bg-primary hover:bg-primary-hover text-white font-medium py-3 transition-all duration-300 shadow-[0_0_20px_-5px_rgba(139,92,246,0.5)]">
            <span class="relative z-10 flex items-center justify-center">
              <el-icon v-if="loginLoading" class="is-loading mr-2"><Loading /></el-icon>
              {{ loginLoading ? 'Authenticating...' : 'Enter System' }}
            </span>
          </button>
        </div>
      </div>
    </div>

    <!-- Main Layout -->
    <div v-else class="h-full flex overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-64 flex-shrink-0 flex flex-col bg-slate-900/50 backdrop-blur-md border-r border-slate-800/60 transition-all z-20">
        <div class="h-20 flex items-center px-6 border-b border-slate-800/60">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-fuchsia-500 shadow-lg shadow-violet-500/20 mr-3"></div>
          <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 to-purple-300 tracking-wide">M7A WebUI</h1>
        </div>

        <div class="flex-1 py-6 px-4 overflow-y-auto custom-scrollbar">
          <nav class="space-y-2">
            <router-link to="/" class="flex items-center px-4 py-3 rounded-xl transition-all duration-300 text-slate-300 hover:text-white hover:bg-slate-800/60 group" active-class="bg-violet-500/10 text-violet-300 border border-violet-500/20 shadow-[inset_0_0_20px_rgba(139,92,246,0.05)]">
              <el-icon class="text-xl mr-3 group-hover:scale-110 transition-transform"><Monitor /></el-icon>
              <span class="font-medium">运行与日志</span>
            </router-link>
            
            <router-link to="/accounts" class="flex items-center px-4 py-3 rounded-xl transition-all duration-300 text-slate-300 hover:text-white hover:bg-slate-800/60 group" active-class="bg-violet-500/10 text-violet-300 border border-violet-500/20 shadow-[inset_0_0_20px_rgba(139,92,246,0.05)]">
              <el-icon class="text-xl mr-3 group-hover:scale-110 transition-transform"><User /></el-icon>
              <span class="font-medium">账号配置</span>
            </router-link>

            <router-link to="/tasks" class="flex items-center px-4 py-3 rounded-xl transition-all duration-300 text-slate-300 hover:text-white hover:bg-slate-800/60 group" active-class="bg-violet-500/10 text-violet-300 border border-violet-500/20 shadow-[inset_0_0_20px_rgba(139,92,246,0.05)]">
              <el-icon class="text-xl mr-3 group-hover:scale-110 transition-transform"><Setting /></el-icon>
              <span class="font-medium">任务配置</span>
            </router-link>

            <router-link to="/settings" class="flex items-center px-4 py-3 rounded-xl transition-all duration-300 text-slate-300 hover:text-white hover:bg-slate-800/60 group" active-class="bg-violet-500/10 text-violet-300 border border-violet-500/20 shadow-[inset_0_0_20px_rgba(139,92,246,0.05)]">
              <el-icon class="text-xl mr-3 group-hover:scale-110 transition-transform"><Tools /></el-icon>
              <span class="font-medium">全局设置</span>
            </router-link>
          </nav>
        </div>

        <div class="p-6 border-t border-slate-800/60">
          <button @click="logout" class="flex items-center justify-center w-full px-4 py-2.5 rounded-lg text-rose-400/80 hover:text-rose-400 hover:bg-rose-500/10 transition-colors border border-transparent hover:border-rose-500/20">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Logout
          </button>
        </div>
      </aside>
      
      <!-- Main Content -->
      <main class="flex-1 relative overflow-x-hidden overflow-y-auto custom-scrollbar">
        <!-- Background accents for main content -->
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-violet-600/10 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
        <div class="p-8 h-full">
          <router-view v-slot="{ Component }">
            <transition name="fade" mode="out-in">
              <component :is="Component" />
            </transition>
          </router-view>
        </div>
      </main>
    </div>
  </div>

  <!-- Dependencies -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4.2.5/dist/vue-router.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  
  <!-- Monaco Editor API -->
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <!-- Application Logic -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/pages/dashboard.js"></script>
  <script src="/static/js/pages/accounts.js"></script>
  <script src="/static/js/pages/tasks.js"></script>
  <script src="/static/js/pages/settings.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
